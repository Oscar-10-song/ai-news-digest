name: AI 前沿日报

on:
  # 由 Vercel Cron 准时触发，避免 GitHub schedule 对低活动仓库延迟
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 安装依赖
        run: npm ci

      - name: 编译 TypeScript
        run: npx tsc

      - name: 生成并发送日报
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: node dist/index.js

      - name: 提交去重数据
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add data/seen.json
          git diff --staged --quiet || git commit -m "data: update seen items [skip ci]"
          git push
